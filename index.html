<!DOCTYPE html><html lang="pt"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Viva Food - Catálogo</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:Arial,sans-serif;display:flex;flex-direction:column;height:100vh}
#viewer{flex:1;display:flex;align-items:center;justify-content:center}
img{max-width:100%;max-height:100%;object-fit:contain}
.controls{display:flex;gap:10px;justify-content:center;padding:12px;background:#222}
button{padding:10px 18px;font-size:16px;border:none;border-radius:8px;cursor:pointer}
#counter{padding:10px;text-align:center}
</style></head><body>
<div id="viewer"><img id="slide"></div>
<div id="counter"></div>
<div class="controls">
<button onclick="prev()">◀ Anterior</button>
<button onclick="toggle()" id="pp">⏸ Pausa</button>
<button onclick="next()">Seguinte ▶</button>
</div>
<script>
const imgs=["BATATA FRITA 100 GR.png","CAMARAO COM ALHO PORα.jpeg","CARDAPIO 1254 X 1254.png","COCA Z.png","CRISTAL.png","ChatGPT Image 23_06_2026, 23_33_14.png","ESPAGUETTI.png","FANTA 33.png","FOLHA 1.png","FOLHA 5.png","IMPERIAL 1,50.png","LASANHA.png","MASSAS FOLHA 4.png","NOSSAS PIZZAS 30 CM.png","PAGINA 2 DE 6.png","PAGINA 2.png","PAGINA 3 DE 6.png","PAGINA 3.png","PAGINA 4.png","QR CODE PROMOÇAO.png","QR CODE VIDEO.png","SALGADAS.png","SALGADINHOS BRASILEIROS 123.png","SOBREMESA WAFFLE AÇAI.png","SUCOS CARDAPIO.png","SUCOS SUCOS SUCOS.png","SWEPP.png","VIVA PASTAS CARDAPIO.png","WAFFLE.png","bolinho de tomate.png","pao de fiambre.jpeg"];
let i=0,play=true;
const el=document.getElementById('slide'),c=document.getElementById('counter'),pp=document.getElementById('pp');
function show(){el.src=imgs[i];c.textContent=(i+1)+" / "+imgs.length;}
function next(){i=(i+1)%imgs.length;show();}
function prev(){i=(i-1+imgs.length)%imgs.length;show();}
function toggle(){play=!play;pp.textContent=play?"⏸ Pausa":"▶ Play";}
setInterval(()=>{if(play)next();},5000);
document.onkeydown=e=>{if(e.key==="ArrowRight")next();if(e.key==="ArrowLeft")prev();if(e.key===" ")toggle();}
show();
</script></body></html>

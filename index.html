<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥤 Viva Food - Cardápio Digital</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #1a1a1a;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #9C27B0 0%, #00BCD4 100%);
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        header h1 {
            font-size: 24px;
            margin: 0;
        }

        #viewer {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            background: #111;
        }

        #slide {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            padding: 15px;
            background: #222;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #9C27B0;
            color: white;
            transition: all 0.3s;
            font-weight: bold;
        }

        button:hover {
            background: #7b1fa2;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        #counter {
            padding: 10px 20px;
            text-align: center;
            background: #333;
            font-weight: bold;
            border-radius: 5px;
        }

        .page-info {
            font-size: 14px;
            color: #00BCD4;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 18px;
            }

            .controls {
                gap: 5px;
            }

            button {
                padding: 10px 15px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🥤 Viva Food - Cardápio Digital</h1>
    </header>

    <div id="viewer">
        <img id="slide" alt="Cardápio">
    </div>

    <div class="controls">
        <button onclick="prev()">⬅️ Anterior</button>
        <div id="counter" class="page-info"></div>
        <button onclick="toggle()" id="pp">⏸️ Pausa</button>
        <button onclick="next()">Próximo ➡️</button>
    </div>

    <script>
        const imgs = [
            "BATATA FRITA 100 GR.png",
            "bolinho de tomate.png",
            "CARDAPIO 1254 X 1254.png",
            "COCA Z.png",
            "CRISTAL.png",
            "ChatGPT Image 23_06_2026, 23_33_14.png",
            "ESPAGUETTI.png",
            "FANTA 33.png",
            "FOLHA 1.png",
            "FOLHA 5.png",
            "IMPERIAL 1,50.png",
            "LASANHA.png",
            "MASSAS FOLHA 4.png",
            "NOSSAS PIZZAS 30 CM.png",
            "PAGINA 2 DE 6.png",
            "PAGINA 2.png",
            "PAGINA 3 DE 6.png",
            "PAGINA 3.png",
            "PAGINA 4.png",
            "QR CODE PROMOÇAO.png",
            "QR CODE VIDEO.png",
            "SALGADAS.png",
            "SALGADINHOS BRASILEIROS 123.png",
            "SOBREMESA WAFFLE AÇAI.png",
            "SUCOS CARDAPIO.png",
            "SUCOS SUCOS SUCOS.png",
            "SWEPP.png",
            "VIVA PASTAS CARDAPIO.png",
            "WAFFLE.png",
            "pao de fiambre.jpeg"
        ];

        let currentIndex = 0;
        let isPlaying = true;
        let autoPlayInterval;

        const slideImg = document.getElementById('slide');
        const counterDiv = document.getElementById('counter');
        const playPauseBtn = document.getElementById('pp');

        function updateDisplay() {
            slideImg.src = imgs[currentIndex];
            counterDiv.textContent = `Página ${currentIndex + 1} de ${imgs.length}`;
        }

        function next() {
            currentIndex = (currentIndex + 1) % imgs.length;
            updateDisplay();
        }

        function prev() {
            currentIndex = (currentIndex - 1 + imgs.length) % imgs.length;
            updateDisplay();
        }

        function toggle() {
            isPlaying = !isPlaying;
            playPauseBtn.textContent = isPlaying ? "⏸️ Pausa" : "▶️ Play";
            if (isPlaying) {
                startAutoPlay();
            } else {
                clearInterval(autoPlayInterval);
            }
        }

        function startAutoPlay() {
            autoPlayInterval = setInterval(next, 5000);
        }

        function handleKeyPress(e) {
            if (e.key === "ArrowRight") next();
            if (e.key === "ArrowLeft") prev();
            if (e.key === " ") toggle();
        }

        document.addEventListener('keydown', handleKeyPress);

        updateDisplay();
        startAutoPlay();

        console.log('✅ Cardápio carregado com sucesso!');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code - Viva Food Catalog</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #9C27B0 0%, #00BCD4 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #9C27B0;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
        #qrcode {
            margin: 20px auto;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
        }
        .url-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #00BCD4;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            background: #9C27B0;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover {
            background: #7b1fa2;
        }
        .download-btn {
            background: #00BCD4;
        }
        .download-btn:hover {
            background: #0097a7;
        }
        .info {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }
        .success {
            color: #4CAF50;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🥤 QR Code</h1>
        <p class="subtitle">Viva Food - Catálogo de Cardápio</p>
        
        <input type="text" id="urlInput" class="url-input" placeholder="Digite a URL aqui..." value="https://vivaacaiportugal-cmd.github.io/MENU-VIVA-A-AI-/">
        
        <div class="button-group">
            <button onclick="gerarQR()">Gerar QR Code</button>
            <button class="download-btn" onclick="baixarQR()">📥 Baixar PNG</button>
        </div>
        
        <div id="qrcode"></div>
        
        <div class="info">
            <p>✅ Escaneie este QR Code com seu celular para acessar o menu completo do Viva Food!</p>
        </div>
    </div>

    <script>
        let qrcodeInstance;

        function gerarQR() {
            const url = document.getElementById('urlInput').value;
            
            if (!url) {
                alert('Por favor, digite uma URL!');
                return;
            }

            // Limpar QR Code anterior
            document.getElementById('qrcode').innerHTML = '';
            
            // Criar novo QR Code
            qrcodeInstance = new QRCode(document.getElementById('qrcode'), {
                text: url,
                width: 300,
                height: 300,
                colorDark: '#9C27B0',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        function baixarQR() {
            const canvas = document.querySelector('canvas');
            if (!canvas) {
                alert('Por favor, gere o QR Code primeiro!');
                return;
            }

            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = 'qrcode-viva-food.png';
            link.click();
        }

        // Gerar QR Code automaticamente ao carregar
        window.addEventListener('load', gerarQR);
    </script>
</body>
</html>
